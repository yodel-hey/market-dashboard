name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
  workflow_run:
    workflows: ["Fetch Market Data"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # Skip if this run was triggered by the fetch workflow failing.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare pages folder
        run: |
          mkdir -p _site
          cp index.html _site/
          cp data.json _site/ 2>/dev/null || echo "data.json not present yet"
          cp history.json _site/ 2>/dev/null || echo "history.json not present yet"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
