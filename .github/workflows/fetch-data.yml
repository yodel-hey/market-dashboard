name: Fetch Market Data

on:
  schedule:
    # 7 specific trigger times per day, offset a few minutes past the hour
    # (not :00) to avoid GitHub's documented top-of-the-hour congestion for
    # scheduled workflows. Each corresponds to a CT target time - see the
    # Python script's ACTIVE_TIMES for the source of truth. These are UTC
    # clock times tied to the current CDT (UTC-5) offset; they will drift by
    # 1 hour once Daylight Saving ends in autumn and need updating then.
    - cron: '8 5 * * *'    # 00:08 CT
    - cron: '9 7 * * *'    # 02:09 CT
    - cron: '8 10 * * *'   # 05:08 CT
    - cron: '9 13 * * *'   # 08:09 CT
    - cron: '10 14 * * *'  # 09:10 CT
    - cron: '9 17 * * *'   # 12:09 CT
    - cron: '11 20 * * *'  # 15:11 CT
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Run now regardless of active hours (testing only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write  # needed so this workflow can commit data.json / history.json back into the repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data fetch script
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          BIGDATA_API_KEY: ${{ secrets.BIGDATA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # Only set (to a truthy value) when someone ticks the "force_run"
          # checkbox on a manual workflow_dispatch run. On the regular
          # schedule triggers this input doesn't exist, so this evaluates to
          # an empty string and the script's normal active-times check applies.
          FORCE_RUN: ${{ inputs.force_run }}
        run: python scripts/fetch_market_data.py

      - name: Commit updated data.json
        run: |
          # Defensive: if a run lands outside all active-time tolerance
          # windows, data.json won't exist yet - don't fail in that case.
          if [ ! -f data.json ]; then
            echo "No data.json produced this run (outside all active-time windows) - nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history.json
          if git diff --staged --quiet; then
            echo "No changes to data.json - nothing to commit."
          else
            git commit -m "Update market data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
