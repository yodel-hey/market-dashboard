name: Fetch Market Data

on:
  schedule:
    # Runs every hour, UTC. The script itself decides whether to actually
    # do anything - it checks the current America/Chicago time and only
    # fetches data inside the configured 14:00-22:00 window. This keeps the
    # DST handling correct year-round without ever needing to edit this file.
    - cron: '0 * * * *'
  workflow_dispatch: {}  # adds a manual "Run workflow" button - use this for the first test run

permissions:
  contents: write  # needed so this workflow can commit data.json back into the repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data fetch script
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          BIGDATA_API_KEY: ${{ secrets.BIGDATA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_market_data.py

      - name: Commit updated data.json
        run: |
          # Defensive: on a first-ever run that happens to land outside the
          # active window, data.json won't exist yet - don't fail in that case.
          if [ ! -f data.json ]; then
            echo "No data.json produced this run (likely outside the active window) - nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to data.json - nothing to commit."
          else
            git commit -m "Update market data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
