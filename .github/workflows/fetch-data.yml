name: Fetch Market Data

on:
  schedule:
    # Runs every hour, UTC. The script itself decides whether to actually
    # do anything - it checks the current America/Chicago time and only
    # fetches data at the configured run hours (0, 2, 5, 8, 9, 12, 15 CT).
    # This keeps the DST handling correct year-round without ever needing
    # to edit this file.
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Run now regardless of active hours (testing only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write  # needed so this workflow can commit data.json / history.json back into the repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data fetch script
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          BIGDATA_API_KEY: ${{ secrets.BIGDATA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # Only set (to a truthy value) when someone ticks the "force_run"
          # checkbox on a manual workflow_dispatch run. On the regular hourly
          # schedule trigger this input doesn't exist, so this evaluates to
          # an empty string and the script's normal active-hours check applies.
          FORCE_RUN: ${{ inputs.force_run }}
        run: python scripts/fetch_market_data.py

      - name: Commit updated data.json
        run: |
          # Defensive: on a first-ever run that happens to land outside the
          # active run hours, data.json won't exist yet - don't fail in that case.
          if [ ! -f data.json ]; then
            echo "No data.json produced this run (likely outside the active run hours) - nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history.json
          if git diff --staged --quiet; then
            echo "No changes to data.json - nothing to commit."
          else
            git commit -m "Update market data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
